[PHP]
; Production settings for Laravel

; error handling
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/log/php-errors.log
error_reporting = E_ALL

; performance
memory_limit = 256M
max_execution_time = 300
max_input_time = 300
upload_max_filesize = 100M
post_max_size = 100M

; opcache - STRONGLY RECOMMENDED for production
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 4000
opcache.revalidate_freq = 0
opcache.validate_timestamps = 0
opcache.file_cache = /app/bootstrap/cache/opcache
opcache.file_cache_only = 0

; realpath cache
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; Date
date.timezone = UTC

; Extensions
extension = pdo_pgsql.so
extension = gd.so
extension = zip.so
extension = bcmath.so

; Session
session.save_path = /var/lib/php/sessions
session.gc_maxlifetime = 7200
session.cookie_httponly = 1
session.cookie_secure = 1
session.use_strict_mode = 1

; Disable dangerous functions
disable_functions = proc_open,proc_close,proc_get_status,proc_nice,proc_terminate,proc_open,system,passthru,exec,shell_exec,proc_open
