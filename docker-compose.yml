services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-docucast}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "--locale=C --encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  reverb:
    image: 1808561084/docucast:latest
    command: reverb
    restart: always
    working_dir: /app
    env_file:
      - .env
    environment:
      APP_URL: https://docucast.bionic-natura.cloud
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
      REVERB_HOST: docucast.bionic-natura.cloud
      REVERB_PORT: 443
      REVERB_SCHEME: https
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test:
        ["CMD-SHELL", 'php -r ''exit(@fsockopen("127.0.0.1", 8080) ? 0 : 1);''']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  app:
    image: 1808561084/docucast:latest
    restart: always
    working_dir: /app
    env_file:
      - .env
    environment:
      APP_URL: https://docucast.bionic-natura.cloud
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REVERB_HOST: docucast.bionic-natura.cloud
      REVERB_PORT: 443
      REVERB_SCHEME: https
      SESSION_SECURE_COOKIES: true
    volumes:
      - app_bootstrap:/app/bootstrap
      - app_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      reverb:
        condition: service_started
    networks:
      - app-network
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_default"
      - "traefik.http.routers.docucast-app.rule=Host(`docucast.bionic-natura.cloud`)"
      - "traefik.http.routers.docucast-app.entrypoints=websecure"
      - "traefik.http.routers.docucast-app.tls=true"
      - "traefik.http.routers.docucast-app.service=docucast-app"
      - "traefik.http.routers.docucast-app.priority=10"
      - "traefik.http.services.docucast-app.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  queue:
    image: 1808561084/docucast:latest
    command: queue
    restart: always
    working_dir: /app
    env_file:
      - .env
    environment:
      APP_URL: https://docucast.bionic-natura.cloud
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REVERB_HOST: docucast.bionic-natura.cloud
      REVERB_PORT: 443
      REVERB_SCHEME: https
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pgrep -f 'artisan (queue:work|horizon)' >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  app-network:
    driver: bridge
  traefik:
    external: true
    name: traefik_default


volumes:
  postgres_data:
  redis_data:
  app_bootstrap:
  app_storage:
