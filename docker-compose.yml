services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: docucast-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-docucast}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "--locale=C --encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prod-network
    restart: unless-stopped

  # Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: docucast-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prod-network
    restart: unless-stopped

  # Web Application (Laravel + Nginx + PHP-FPM)
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_REVERB_APP_KEY: ${VITE_REVERB_APP_KEY:-docucast-app-key}
        VITE_REVERB_HOST: ${VITE_REVERB_HOST:-localhost}
        VITE_REVERB_PORT: ${VITE_REVERB_PORT:-8080}
        VITE_REVERB_SCHEME: ${VITE_REVERB_SCHEME:-http}
    image: docucast:latest
    container_name: docucast-app
    restart: always
    working_dir: /app
    environment:
      APP_NAME: ${APP_NAME:-DocuCast}
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost}

      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      LOG_LEVEL: ${LOG_LEVEL:-info}

      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-docucast}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}

      BROADCAST_CONNECTION: ${BROADCAST_CONNECTION:-reverb}
      BROADCAST_DRIVER: ${BROADCAST_DRIVER:-reverb}
      REVERB_APP_ID: ${REVERB_APP_ID:-docucast}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-docucast-app-key}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-docucast-app-secret}
      REVERB_HOST: reverb
      REVERB_PORT: ${REVERB_PORT:-8080}
      REVERB_SCHEME: ${REVERB_SCHEME:-http}

      CACHE_STORE: ${CACHE_STORE:-redis}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      SESSION_SECURE_COOKIES: false

      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}

      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - app_bootstrap:/app/bootstrap
      - app_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - prod-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Reverb WebSocket Server
  reverb:
    image: docucast:latest
    container_name: docucast-reverb
    command: reverb
    restart: always
    working_dir: /app
    environment:
      APP_NAME: ${APP_NAME:-DocuCast}
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-false}

      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: ${REVERB_PORT:-8080}
      REVERB_APP_ID: ${REVERB_APP_ID:-docucast}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-docucast-app-key}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-docucast-app-secret}
      REVERB_HOST: ${REVERB_HOST:-localhost}
      REVERB_PORT: ${REVERB_PORT:-8080}
      REVERB_SCHEME: ${REVERB_SCHEME:-http}
      REVERB_APP_HOST: ${REVERB_APP_HOST:-localhost}
      REVERB_APP_PORT: ${REVERB_APP_PORT:-8080}
      REVERB_APP_SCHEME: ${REVERB_APP_SCHEME:-http}

      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-docucast}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}

      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      CACHE_STORE: ${CACHE_STORE:-redis}
      BROADCAST_CONNECTION: ${BROADCAST_CONNECTION:-reverb}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
    ports:
      - "${REVERB_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - prod-network
    healthcheck:
      test:
        ["CMD-SHELL", 'php -r ''exit(@fsockopen("127.0.0.1", 8080) ? 0 : 1);''']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Queue Worker (Horizon)
  queue:
    image: docucast:latest
    container_name: docucast-queue
    command: queue
    restart: always
    working_dir: /app
    environment:
      APP_NAME: ${APP_NAME:-DocuCast}
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-false}

      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-docucast}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}

      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      BROADCAST_CONNECTION: ${BROADCAST_CONNECTION:-reverb}
      REVERB_APP_ID: ${REVERB_APP_ID:-docucast}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-docucast-app-key}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-docucast-app-secret}
      CACHE_STORE: ${CACHE_STORE:-redis}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - prod-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pgrep -f 'artisan (queue:work|horizon)' >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  prod-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  app_bootstrap:
  app_storage:
