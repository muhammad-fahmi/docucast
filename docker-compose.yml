x-docucast-image: &docucast-image
  build:
    context: .
    dockerfile: Dockerfile
    args:
      VITE_REVERB_APP_KEY: docucast-app-key
      VITE_REVERB_HOST: docucast.bionic-natura.cloud
      VITE_REVERB_PORT: 443
      VITE_REVERB_SCHEME: https
  image: docucast:latest

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: docucast-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-docucast}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "--locale=C --encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    labels:
      - "traefik.enable=false"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prod-network
    restart: unless-stopped

  # Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: docucast-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    labels:
      - "traefik.enable=false"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prod-network
    restart: unless-stopped

  # Web Application (Laravel + Nginx + PHP-FPM)
  app:
    <<: *docucast-image
    container_name: docucast-app
    restart: always
    working_dir: /app
    env_file:
      - .env.docker
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SESSION_SECURE_COOKIES: ${SESSION_SECURE_COOKIES:-true}
    expose:
      - "80"
    volumes:
      - app_bootstrap:/app/bootstrap
      - app_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - prod-network
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_default"
      - "traefik.http.routers.docucast-app.rule=Host(`docucast.bionic-natura.cloud`)"
      - "traefik.http.routers.docucast-app.entrypoints=websecure"
      - "traefik.http.routers.docucast-app.tls=true"
      - "traefik.http.routers.docucast-app.service=docucast-app"
      - "traefik.http.routers.docucast-app.priority=10"
      - "traefik.http.services.docucast-app.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Reverb WebSocket Server
  reverb:
    <<: *docucast-image
    container_name: docucast-reverb
    command: reverb
    restart: always
    working_dir: /app
    env_file:
      - .env.docker
    environment:
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - prod-network
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_default"
      - "traefik.http.routers.docucast-reverb.rule=Host(`docucast.bionic-natura.cloud`) && (PathPrefix(`/app`) || PathPrefix(`/apps`))"
      - "traefik.http.routers.docucast-reverb.entrypoints=websecure"
      - "traefik.http.routers.docucast-reverb.tls=true"
      - "traefik.http.routers.docucast-reverb.service=docucast-reverb"
      - "traefik.http.routers.docucast-reverb.priority=20"
      - "traefik.http.services.docucast-reverb.loadbalancer.server.port=8080"
    healthcheck:
      test:
        ["CMD-SHELL", 'php -r ''exit(@fsockopen("127.0.0.1", 8080) ? 0 : 1);''']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Queue Worker (Horizon)
  queue:
    <<: *docucast-image
    container_name: docucast-queue
    command: queue
    restart: always
    working_dir: /app
    env_file:
      - .env.docker
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REVERB_HOST: reverb
      REVERB_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - prod-network
    labels:
      - "traefik.enable=false"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pgrep -f 'artisan (queue:work|horizon)' >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  prod-network:
    driver: bridge
  traefik:
    external: true
    name: traefik_default

volumes:
  postgres_data:
  redis_data:
  app_bootstrap:
  app_storage:
