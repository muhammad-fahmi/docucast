x-docucast-image: &docucast-image
  build:
    context: .
    dockerfile: Dockerfile.local
    args:
      VITE_REVERB_APP_KEY: ${REVERB_APP_KEY:-docucast-app-key}
      VITE_REVERB_HOST: localhost
      VITE_REVERB_PORT: 8090
      VITE_REVERB_SCHEME: http
  image: 1808561084/docucast:local

services:
  postgres:
    image: postgres:16-alpine
    container_name: docucast-local-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-docucast}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "--locale=C --encoding=UTF8"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=$$POSTGRES_PASSWORD psql -U $$POSTGRES_USER -d $$POSTGRES_DB -c 'SELECT 1' > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - local-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: docucast-local-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_local_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - local-network
    restart: unless-stopped

  reverb:
    <<: *docucast-image
    container_name: docucast-local-reverb
    command: reverb
    restart: always
    working_dir: /app
    env_file:
      - .env
    environment:
      APP_URL: http://localhost:8090
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
      REVERB_HOST: localhost
      REVERB_PORT: 8090
      REVERB_SCHEME: http
      SESSION_SECURE_COOKIES: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - local-network
    healthcheck:
      test:
        ["CMD-SHELL", 'php -r ''exit(@fsockopen("127.0.0.1", 8080) ? 0 : 1);''']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  app:
    <<: *docucast-image
    container_name: docucast-local-app
    restart: always
    working_dir: /app
    ports:
      - "8090:80"
    env_file:
      - .env
    environment:
      APP_URL: http://localhost:8090
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REVERB_HOST: localhost
      REVERB_PORT: 8090
      REVERB_SCHEME: http
      SESSION_SECURE_COOKIES: false
    volumes:
      - app_local_bootstrap:/app/bootstrap
      - app_local_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      reverb:
        condition: service_started
    networks:
      - local-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  queue:
    <<: *docucast-image
    container_name: docucast-local-queue
    command: queue
    restart: always
    working_dir: /app
    env_file:
      - .env
    environment:
      APP_URL: http://localhost:8090
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REVERB_HOST: localhost
      REVERB_PORT: 8090
      REVERB_SCHEME: http
      SESSION_SECURE_COOKIES: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - local-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pgrep -f 'artisan (queue:work|horizon)' >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  local-network:
    driver: bridge

volumes:
  postgres_local_data:
  redis_local_data:
  app_local_bootstrap:
  app_local_storage:
